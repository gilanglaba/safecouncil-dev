[pytest]
markers =
    unit: Unit tests (no API calls, no live server required)
    integration: Integration tests (require live Flask server on localhost:5000)
    live_api: Tests that make real LLM API calls (require API keys)

# Default: run only unit tests. Use -m integration or -m live_api to include others.
addopts = -m "not integration and not live_api"

testpaths = tests
